<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Minecraft First Person</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        /* 画面中央の照準（クロスヘア） */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
        }
        /* クリックを促す案内 */
        #instructions {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.5);
            color: white;
            font-family: sans-serif;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
    <div id="instructions">画面をクリックしてスタート (WASDで移動)</div>
    <div id="crosshair">+</div>

    <script src="javascript.js"></script>
</body>
</html>
